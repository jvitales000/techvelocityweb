<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('tvTheme')==='light')document.documentElement.classList.add('light');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Tech Velocity</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="https://img1.wsimg.com/isteam/ip/0690e33b-189f-4e07-abdb-cafb251917ba/favicon/72aa41fe-38b5-4123-93fa-1fb8ac8a4fa2/d0ff185c-9200-4dec-a6d4-c67de6a38920.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#03070c;--card:#0a1a2e;--border:rgba(130,190,255,0.10);--accent:#00e5a0;--text:#eef5fc;--muted:#8fabc7;}
    html.light{--bg:#ffffff;--card:#f4faf8;--border:rgba(0,152,112,0.15);--accent:#009870;--text:#0c1a2e;--muted:#456280;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;}
    .wrap{max-width:520px;}
    .code{font-size:clamp(5rem,18vw,8rem);font-weight:800;letter-spacing:-4px;line-height:1;background:linear-gradient(120deg,var(--accent),#38d9ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    h1{font-size:1.4rem;font-weight:700;margin:16px 0 10px;}
    p{color:var(--muted);font-size:0.95rem;line-height:1.7;margin-bottom:28px;}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    a.primary{background:var(--accent);color:#000;padding:14px 28px;border-radius:10px;font-weight:700;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;}
    a.primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,229,160,0.35);}
    a.secondary{border:1px solid var(--border);color:var(--text);padding:14px 28px;border-radius:10px;font-weight:600;text-decoration:none;transition:border-color 0.2s;}
    a.secondary:hover{border-color:var(--accent);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The page you're looking for may have moved or was never here. Let's get you back to something useful.</p>
    <div class="btns">
      <a class="primary" href="/">Back to Home</a>
      <a class="secondary" href="/contact">Book a Free AI Audit</a>
    </div>
  </div>
</body>
</html>
